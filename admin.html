<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Create Match</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ADMIN<span>PANEL</span></div>
        <button onclick="window.location.href='index.html'" class="wallet-badge">Back to Home</button>
    </nav>

    <div class="content-section">
        <div class="card">
            <h3>Create New Match</h3>
            <div class="admin-form">
                <input type="text" id="mTitle" placeholder="Match Title (e.g. Daily Solo)">
                <input type="text" id="mMap" placeholder="Map (Bermuda/Purgatory)">
                <select id="mType">
                    <option value="SOLO">SOLO</option>
                    <option value="DUO">DUO</option>
                    <option value="SQUAD">SQUAD</option>
                </select>
                <input type="datetime-local" id="mTime" placeholder="Start Time">
                <input type="number" id="mEntry" placeholder="Entry Fee (৳)">
                <input type="number" id="mPrize" placeholder="Win Prize (৳)">
                <input type="text" id="mRoomId" placeholder="Room ID (Optional)">
                <input type="text" id="mPass" placeholder="Room Password (Optional)">
                
                <button class="action-btn" style="margin-top:20px;" onclick="addMatchToDB()">ADD MATCH</button>
            </div>
        </div>
    </div>

    <script>
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCXeBxPtMSCuNyoctZ61g7eUNZgG0FyISE",
  authDomain: "shgesports-15815.firebaseapp.com",
  projectId: "shgesports-15815",
  storageBucket: "shgesports-15815.firebasestorage.app",
  messagingSenderId: "899657492968",
  appId: "1:899657492968:web:5f9a897f47ea97e1c35c5d",
  measurementId: "G-NTG8VCBYLM"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function addMatchToDB() {
            const title = document.getElementById('mTitle').value;
            const map = document.getElementById('mMap').value;
            const type = document.getElementById('mType').value;
            const time = document.getElementById('mTime').value;
            const entry = parseInt(document.getElementById('mEntry').value);
            const prize = parseInt(document.getElementById('mPrize').value);
            const roomId = document.getElementById('mRoomId').value;
            const pass = document.getElementById('mPass').value;

            if(!title || !time || !entry) {
                alert("Sob gulo field puron koro!");
                return;
            }

            try {
                // Formatting time to match auto-delete logic
                const formattedTime = time.replace("T", " "); 

                await db.collection("matches").add({
                    title: title,
                    map: map,
                    type: type,
                    startTime: formattedTime,
                    entryFee: entry,
                    prize: prize,
                    roomId: roomId || "Upcoming",
                    roomPass: pass || "Upcoming",
                    players: [] // Empty array for new match
                });

                alert("Match successfully added!");
                window.location.reload();
            } catch (error) {
                console.error("Error adding match: ", error);
            }
        }
    </script>

    <style>
        .admin-form input, .admin-form select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
        }
    </style>
</body>
</html>

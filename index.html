<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIK TOP UP - SHG ESports Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --primary: #00d4ff; --bg: #050b18; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 1px solid var(--primary); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        .page { display: none; min-height: 100vh; padding-bottom: 90px; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>

    <div id="auth-page" class="page flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-[2rem] text-center neon-border">
            <h1 class="text-4xl font-bold mb-2 neon-text font-['Orbitron'] tracking-tighter text-cyan-400">SHG ESPORTS</h1>
            <p class="text-gray-400 mb-8 text-sm uppercase tracking-widest">Premium Gaming Network</p>
            
            <div class="flex mb-8 bg-black/40 rounded-2xl p-1 border border-white/5">
                <button id="btn-login" onclick="toggleAuth('login')" class="flex-1 py-3 rounded-xl bg-cyan-500 font-bold transition-all">Login</button>
                <button id="btn-reg" onclick="toggleAuth('reg')" class="flex-1 py-3 rounded-xl font-bold transition-all">Register</button>
            </div>
            
            <div id="login-form" class="space-y-4">
                <div class="relative"><i class="fas fa-user absolute left-4 top-5 text-gray-500"></i><input id="l-uid" type="text" placeholder="Game UID" class="w-full pl-12 p-4 rounded-xl focus:border-cyan-500 outline-none"></div>
                <div class="relative"><i class="fas fa-lock absolute left-4 top-5 text-gray-500"></i><input id="l-pass" type="password" placeholder="Password" class="w-full pl-12 p-4 rounded-xl outline-none"></div>
                <button onclick="app.login()" class="w-full bg-cyan-500 py-4 rounded-xl font-bold hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-cyan-500/20">SIGN IN</button>
            </div>

            <div id="reg-form" class="hidden space-y-4">
                <input id="r-name" type="text" placeholder="Full Name" class="w-full p-4 rounded-xl outline-none">
                <input id="r-uid" type="text" placeholder="Free Fire UID" class="w-full p-4 rounded-xl outline-none">
                <input id="r-pass" type="password" placeholder="Set Password" class="w-full p-4 rounded-xl outline-none">
                <button onclick="app.register()" class="w-full bg-cyan-500 py-4 rounded-xl font-bold shadow-lg shadow-cyan-500/20">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <header class="p-6 flex justify-between items-center glass sticky top-0 z-50 border-b border-white/5">
            <div>
                <p class="text-xs text-cyan-400 font-bold uppercase tracking-widest">VETERAN PLAYER</p>
                <h2 id="u-name" class="text-xl font-bold">...</h2>
            </div>
            <div onclick="showPage('deposit-page')" class="bg-cyan-500/10 border border-cyan-500/30 px-4 py-2 rounded-xl flex items-center gap-3 cursor-pointer">
                <i class="fas fa-wallet text-cyan-400"></i>
                <span id="u-balance" class="font-bold text-lg">0</span>
            </div>
        </header>

        <main class="p-6">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass p-5 rounded-3xl text-center border-b-2 border-cyan-500">
                    <p class="text-gray-500 text-xs uppercase mb-1">Total Wins</p>
                    <h4 class="text-2xl font-bold">0</h4>
                </div>
                <div class="glass p-5 rounded-3xl text-center border-b-2 border-purple-500">
                    <p class="text-gray-500 text-xs uppercase mb-1">Kills</p>
                    <h4 class="text-2xl font-bold">0</h4>
                </div>
            </div>

            <h3 class="text-lg font-bold mb-4 flex items-center gap-2 font-['Orbitron']"><i class="fas fa-crosshairs text-red-500"></i> Live Tournaments</h3>
            <div id="match-list" class="space-y-4">
                </div>
        </main>
    </div>

    <div id="deposit-page" class="page p-6">
        <button onclick="showPage('home-page')" class="mb-6 text-gray-400"><i class="fas fa-chevron-left mr-2"></i> Dashboard</button>
        <div class="glass p-8 rounded-[2rem] border border-white/10">
            <h2 class="text-2xl font-bold mb-2">Deposit Balance</h2>
            <p class="text-gray-400 mb-8 text-sm">Automated Payment via Cloud Sync</p>
            
            <div class="space-y-4">
                <select id="pay-type" class="w-full p-4 rounded-xl outline-none">
                    <option value="Bkash">Bkash Personal</option>
                    <option value="Nagad">Nagad Personal</option>
                </select>
                <input id="pay-amt" type="number" placeholder="Enter Amount (৳)" class="w-full p-4 rounded-xl outline-none">
                <input id="pay-info" type="text" placeholder="Sender Number / Transaction ID" class="w-full p-4 rounded-xl outline-none">
                
                <div class="bg-blue-500/10 p-4 rounded-xl border border-blue-500/20 mb-4">
                    <p class="text-xs text-blue-400 mb-1">Admin Number:</p>
                    <p class="font-bold text-lg">01XXXXXXXXX</p>
                </div>
                
                <button onclick="app.submitPayment()" class="w-full bg-cyan-500 py-4 rounded-xl font-bold text-lg">CONFIRM DEPOSIT</button>
            </div>
        </div>
    </div>

    <nav id="main-nav" class="fixed bottom-0 w-full glass border-t border-white/10 p-4 flex justify-around items-center rounded-t-[2.5rem] z-50">
        <button onclick="showPage('home-page')" class="text-xl text-cyan-400 p-2"><i class="fas fa-home"></i></button>
        <button onclick="showPage('matches-page')" class="text-xl text-gray-500 p-2"><i class="fas fa-gamepad"></i></button>
        <button onclick="showPage('profile-page')" class="text-xl text-gray-500 p-2"><i class="fas fa-user"></i></button>
        <button onclick="showPage('admin-page')" class="text-xl text-gray-800 p-2"><i class="fas fa-shield-alt"></i></button>
    </nav>

    <script>
        // NAVIGATION ENGINE
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('main-nav').style.display = (id === 'auth-page') ? 'none' : 'flex';
        }

        function toggleAuth(mode) {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', mode === 'login');
            document.getElementById('btn-login').className = mode === 'login' ? 'flex-1 py-3 rounded-xl bg-cyan-500 font-bold' : 'flex-1 py-3 rounded-xl font-bold';
            document.getElementById('btn-reg').className = mode === 'reg' ? 'flex-1 py-3 rounded-xl bg-cyan-500 font-bold' : 'flex-1 py-3 rounded-xl font-bold';
        }

        // CORE APP OBJECT (FIREBASE DRIVEN)
        const app = {
            db: { current: JSON.parse(localStorage.getItem('shg_session')), matches: [] },

            updateUI: function() {
                if(!this.db.current) return;
                document.getElementById('u-name').innerText = this.db.current.name;
                document.getElementById('u-balance').innerText = this.db.current.balance + " ৳";
            },

            register: async function() {
                const n = document.getElementById('r-name').value, u = document.getElementById('r-uid').value, p = document.getElementById('r-pass').value;
                if(!n || !u || !p) return alert("Fill all fields!");

                try {
                    const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    const userData = { name: n, uid: u, pass: p, balance: 0, rank: "SOLDIER", total_spent: 0 };
                    await setDoc(doc(window.db, "users", u), userData);
                    this.db.current = userData;
                    localStorage.setItem('shg_session', JSON.stringify(userData));
                    location.reload();
                } catch(e) { alert("Registration Failed!"); }
            },

            login: async function() {
                const u = document.getElementById('l-uid').value, p = document.getElementById('l-pass').value;
                try {
                    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    const userSnap = await getDoc(doc(window.db, "users", u));
                    if(userSnap.exists() && userSnap.data().pass === p) {
                        this.db.current = userSnap.data();
                        localStorage.setItem('shg_session', JSON.stringify(this.db.current));
                        location.reload();
                    } else alert("Wrong UID/Password!");
                } catch(e) { alert("Server Error!"); }
            },

            renderMatches: function() {
                const list = document.getElementById('match-list');
                list.innerHTML = this.db.matches.map(m => `
                    <div class="glass p-5 rounded-[1.5rem] border-l-4 border-cyan-500 relative overflow-hidden">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-lg tracking-wide">${m.title}</h4>
                                <p class="text-xs text-gray-400"><i class="far fa-clock mr-1"></i> ${m.time}</p>
                            </div>
                            <div class="text-right">
                                <span class="block text-cyan-400 font-bold">৳${m.fee}</span>
                                <span class="text-[10px] text-gray-500 uppercase">Entry Fee</span>
                            </div>
                        </div>
                        <div class="mt-4 flex justify-between items-center border-t border-white/5 pt-4">
                            <div class="flex gap-4">
                                <div><p class="text-[10px] text-gray-500 uppercase">Prize</p><p class="text-sm font-bold text-yellow-500">৳${m.prize}</p></div>
                                <div><p class="text-[10px] text-gray-500 uppercase">Map</p><p class="text-sm font-bold">Bermuda</p></div>
                            </div>
                            <button onclick="app.joinMatch('${m.id}')" class="bg-cyan-500 px-6 py-2 rounded-xl text-xs font-bold hover:brightness-110 active:scale-95 transition-all">JOIN NOW</button>
                        </div>
                    </div>
                `).join('');
            },

            submitPayment: async function() {
                const t = document.getElementById('pay-type').value, a = document.getElementById('pay-amt').value, i = document.getElementById('pay-info').value;
                if(!a || !i) return alert("All fields are mandatory!");
                try {
                    const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    await addDoc(collection(window.db, "payments"), { u: this.db.current.uid, t, a, i, status: "Pending", date: new Date().toLocaleDateString() });
                    alert("Payment submitted to Cloud! Wait for approval.");
                    showPage('home-page');
                } catch(e) { alert("Error connecting to cloud!"); }
            }
        };

        window.onload = () => {
            if(app.db.current) { showPage('home-page'); app.updateUI(); }
            else { showPage('auth-page'); }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXeBxPtMScUNyoctZ61g7eUNy-...", // Pura key ekhane boshaben
            authDomain: "shgesports-15815.firebaseapp.com",
            projectId: "shgesports-15815",
            storageBucket: "shgesports-15815.appspot.com",
            messagingSenderId: "899657492968",
            appId: "1:899657492968:web:5f9a897f47ea683707834a",
            measurementId: "G-NTG8VCBYLM"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);
        window.db = db;

        // Listen for Matches in Cloud
        const qMatches = query(collection(db, "matches"), orderBy("timestamp", "desc"));
        onSnapshot(qMatches, (snapshot) => {
            app.db.matches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            app.renderMatches();
        });

        // Listen for User Balance Updates
        if(app.db.current) {
            import { doc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
            onSnapshot(doc(db, "users", app.db.current.uid), (doc) => {
                if(doc.exists()) {
                    app.db.current = doc.data();
                    localStorage.setItem('shg_session', JSON.stringify(app.db.current));
                    app.updateUI();
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nik Top Up | Ultimate ESports</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NIK<span>BOY</span></div>
        <div class="nav-right">
            <div class="wallet-badge" onclick="switchSection('wallet')">
                <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="20">
                ৳ <span id="userBalance">0</span>
            </div>
            <i class="fas fa-user-circle profile-icon" onclick="toggleModal('profileModal')"></i>
        </div>
    </nav>

    <div class="main-tabs">
        <button class="t-btn active" onclick="switchSection('matches')"><i class="fas fa-gamepad"></i> Matches</button>
        <button class="t-btn" onclick="switchSection('wallet')"><i class="fas fa-wallet"></i> Wallet</button>
        <button class="t-btn" onclick="switchSection('history')"><i class="fas fa-history"></i> History</button>
        <button id="adminBtn" class="t-btn hidden" onclick="window.location.href='admin.html'"><i class="fas fa-user-shield"></i> Admin</button>
    </div>

    <main id="matches" class="content-section">
        <div class="banner">
            <marquee>Welcome to Nik Top Up ESports! Join matches and win big prizes.</marquee>
        </div>
        <div id="matchContainer">
            <p style="text-align:center; margin-top:20px;">Loading matches...</p>
        </div>
    </main>

    <section id="wallet" class="content-section hidden">
        <div class="card deposit-card">
            <h3>Add Money (Auto Deposit)</h3>
            <div class="method-box">
                <p>Bkash/Nagad (Personal): <b>017XXXXXXXX</b></p>
            </div>
            <input type="number" id="depAmount" placeholder="Enter Amount">
            <input type="text" id="txnId" placeholder="Transaction ID">
            <button class="action-btn" onclick="submitDeposit()">Submit Deposit</button>
        </div>
    </section>

    <section id="history" class="content-section hidden">
        <div class="history-list">
            <h3>Transaction History</h3>
            <div id="txnLogs">No history found.</div>
        </div>
    </section>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleModal('profileModal')">&times;</span>
            <div class="p-header">
                <div class="p-avatar"></div>
                <h2 id="pName">Nikboy Developer</h2>
                <p>ID: <span id="uID">#12345</span></p>
            </div>
            <div class="p-options">
                <div class="opt" onclick="window.open('https://t.me/yourlink')"><i class="fab fa-telegram"></i> Telegram Support</div>
                <div class="opt" onclick="window.open('https://wa.me/number')"><i class="fab fa-whatsapp"></i> WhatsApp Help</div>
                <div class="opt logout"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHG ESPORTS | Game Top-Up Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SHG <span>ESPORTS</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Games</a></li>
            <li><a href="#">Support</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Fastest Game Top-Up in Bangladesh</h1>
        <p>Reliable service for Free Fire, PUBG & more.</p>
    </header>

    <main class="container">
        <div class="product-grid">
            <div class="card">
                <div class="badge">Hot</div>
                <img src="https://img.freepik.com/free-vector/free-fire-game-logo_52683-45044.jpg" alt="Free Fire">
                <h3>Free Fire Diamonds</h3>
                <p>Instant Delivery via UID</p>
                <button class="buy-btn" onclick="openModal('Free Fire Diamonds')">Buy Now</button>
            </div>

            <div class="card">
                <img src="https://w0.peakpx.com/wallpaper/1010/364/wallpaper-pubg-mobile-logo.jpg" alt="PUBG">
                <h3>PUBG Mobile UC</h3>
                <p>Global/BD Region</p>
                <button class="buy-btn" onclick="openModal('PUBG Mobile UC')">Buy Now</button>
            </div>
        </div>
    </main>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="orderModal">
        <h2 id="productTitle" style="color: #f39c12;">Order Form</h2>
        <form id="topupForm">
            <input type="text" id="playerID" placeholder="Player ID / UID" required>
            <input type="tel" id="userPhone" placeholder="Your Phone Number" required>
            <select id="payMethod">
                <option value="Bkash">Bkash (Manual)</option>
                <option value="Nagad">Nagad (Manual)</option>
            </select>
            <input type="text" id="trxID" placeholder="Transaction ID (TxID)" required>
            <button type="submit" class="submit-btn">Confirm Order</button>
            <button type="button" class="close-btn" onclick="closeModal()">Cancel</button>
        </form>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

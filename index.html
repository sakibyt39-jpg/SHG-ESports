<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHG亗ESPORTS | Room ID & Pass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00d2ff; 
            --secondary: #3a7bd5;
            --bg: #05070a; 
            --card-bg: rgba(13, 17, 23, 0.8); 
            --success: #00ff88; 
            --danger: #ff3e3e; 
            --text: #e1e1e1;
        }

        body { 
            margin: 0; 
            font-family: 'Rajdhani', sans-serif; 
            background: radial-gradient(circle at top, #111e31 0%, #05070a 100%); 
            color: var(--text); 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; z-index: 5000; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); transition: 0.3s; }

        nav { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Oxanium', sans-serif; color: var(--primary); font-size: 22px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px var(--secondary); }
        .nav-links button { background: none; border: none; color: #aaa; margin-left: 15px; cursor: pointer; font-size: 13px; font-weight: 700; text-transform: uppercase; transition: 0.3s; font-family: 'Oxanium'; }

        .container { padding: 25px 5%; max-width: 850px; margin: auto; }
        .section { display: none; animation: fadeIn 0.5s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .card { background: var(--card-bg); border: 1px solid rgba(58, 123, 213, 0.3); border-radius: 16px; padding: 25px; margin-bottom: 25px; position: relative; backdrop-filter: blur(5px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        .timer-box { position: absolute; top: -10px; right: 20px; background: var(--danger); color: white; padding: 5px 15px; border-radius: 8px; font-family: 'Oxanium'; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(255, 62, 62, 0.3); }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #080a0f; border: 1px solid #1e293b; color: white; border-radius: 10px; font-family: 'Rajdhani'; font-size: 16px; transition: 0.3s; }
        .btn { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-family: 'Oxanium'; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; }
        .btn:hover { filter: brightness(1.2); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 35px; border-radius: 20px; width: 90%; max-width: 420px; border: 1px solid var(--primary); position: relative; }

        .room-info-card { background: rgba(0, 210, 255, 0.1); border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<a href="https://wa.me/01941686065" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<nav>
    <div class="logo">SHG亗ESPORTS</div>
    <div class="nav-links">
        <button onclick="showPage('home')">Matches</button>
        <button onclick="showPage('profile')">Profile</button>
        <button onclick="showPage('admin-login')">Admin</button>
    </div>
</nav>

<div id="joinModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Oxanium'; color:var(--primary); margin-top:0;">REGISTRATION</h2>
        <input type="hidden" id="joinMatchId">
        <input type="text" id="game-name" placeholder="Free Fire Name">
        <input type="text" id="game-uid" placeholder="Free Fire UID">
        <button class="btn" onclick="confirmJoin()">Confirm Join</button>
        <button class="btn" style="background:#1e293b;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div class="container">
    <div id="home" class="section active">
        <div id="match-display-container"></div>
    </div>

    <div id="profile" class="section">
        <div class="card">
            <h2 id="p-name" style="margin:0; font-family:'Oxanium';">Player Name</h2>
            <p id="p-uid-display" style="color:var(--primary);">UID: 000</p>
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center;">
                <small>BALANCE</small><br>
                <span style="font-size:28px; font-weight:700; color:var(--success);">৳<span id="u-bal">0</span></span>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <button class="btn" onclick="showPage('wallet-system')">Wallet</button>
                <button class="btn" style="background:#1e293b;" onclick="userLogout()">Logout</button>
            </div>
        </div>
        <h3 style="font-family:'Oxanium';">Joined Tournaments</h3>
        <div id="my-match-list"></div>
    </div>

    <div id="wallet-system" class="section">
        <div class="card">
            <h2 style="font-family:'Oxanium';">WALLET</h2>
            <select id="w-type"><option value="dep">Deposit</option><option value="wit">Withdraw</option></select>
            <input type="number" id="w-amount" placeholder="Amount">
            <input type="text" id="w-info" placeholder="TrxID / Number">
            <button class="btn" onclick="submitRequest()">Submit</button>
        </div>
    </div>

    <div id="admin-login" class="section">
        <div id="admin-auth" class="card" style="max-width:400px; margin:auto; text-align:center;">
            <h3>ADMIN LOGIN</h3>
            <input type="password" id="adminPass" placeholder="Admin Key">
            <button class="btn" onclick="loginAdmin()">Login</button>
        </div>
        
        <div id="admin-dash" style="display:none;">
            <div class="card">
                <h4>ADMIN WALLET: <span id="admin-revenue" style="color:var(--success);">৳0</span></h4>
            </div>

            <div class="card">
                <h4>CREATE MATCH (ADD ROOM INFO)</h4>
                <input type="text" id="m-name" placeholder="Match Name">
                <input type="number" id="m-fee" placeholder="Fee">
                <input type="number" id="m-prize" placeholder="Prize">
                <input type="datetime-local" id="m-time">
                <hr style="border:0.5px solid #333; margin:15px 0;">
                <input type="text" id="m-room" placeholder="Room ID (Set now or later)">
                <input type="text" id="m-pass" placeholder="Room Password">
                <button class="btn" onclick="createMatch()">Publish Match</button>
            </div>

            <div class="card">
                <h4>JOINED PLAYERS</h4>
                <div id="player-list-body"></div>
            </div>

            <div class="card">
                <h4>WALLET REQUESTS</h4>
                <div id="admin-requests"></div>
            </div>
            <button class="btn" style="background:var(--danger);" onclick="location.reload()">Exit Admin</button>
        </div>
    </div>
</div>

<script>
    let dbUsers = JSON.parse(localStorage.getItem('shg_db_users')) || {};
    let user = JSON.parse(localStorage.getItem('shg_current_user')) || null;
    let matches = JSON.parse(localStorage.getItem('shg_matches')) || [];
    let requests = JSON.parse(localStorage.getItem('shg_requests')) || [];
    let registrations = JSON.parse(localStorage.getItem('shg_regs')) || [];
    let adminStats = JSON.parse(localStorage.getItem('shg_admin_stats')) || { revenue: 0 };

    function saveDB() {
        localStorage.setItem('shg_db_users', JSON.stringify(dbUsers));
        localStorage.setItem('shg_current_user', JSON.stringify(user));
        localStorage.setItem('shg_matches', JSON.stringify(matches));
        localStorage.setItem('shg_requests', JSON.stringify(requests));
        localStorage.setItem('shg_regs', JSON.stringify(registrations));
        localStorage.setItem('shg_admin_stats', JSON.stringify(adminStats));
    }

    function showPage(id) {
        if(!user && (id === 'profile' || id === 'wallet-system')) return alert("Join a match first!");
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(user) {
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-uid-display').innerText = "UID: " + user.uid;
            document.getElementById('u-bal').innerText = user.balance;
            renderMyMatches();
        }
    }

    function openJoinForm(id) {
        if(!user) {
            let n = prompt("Name:"), u = prompt("Account UID:");
            if(n && u) { user = dbUsers[u] || { name: n, uid: u, balance: 0, joined_matches: [] }; dbUsers[u] = user; saveDB(); } else return;
        }
        document.getElementById('joinMatchId').value = id;
        document.getElementById('joinModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('joinModal').style.display = 'none'; }

    function confirmJoin() {
        const mid = document.getElementById('joinMatchId').value, ign = document.getElementById('game-name').value, guid = document.getElementById('game-uid').value;
        const match = matches.find(m => m.id == mid);
        if(!ign || !guid) return alert("Fill Info!");
        if(user.balance < match.fee) return alert("Low Balance!");
        
        user.balance -= parseFloat(match.fee);
        adminStats.revenue += parseFloat(match.fee);
        const data = { mid, mName: match.name, ign, guid, userUid: user.uid };
        registrations.push(data);
        user.joined_matches.push(data);
        dbUsers[user.uid] = user;
        saveDB();
        alert("Joined!"); closeModal(); showPage('profile');
    }

    function loginAdmin() {
        if(document.getElementById('adminPass').value === "shg123") {
            document.getElementById('admin-auth').style.display='none';
            document.getElementById('admin-dash').style.display='block';
            renderAdminPanel();
        }
    }

    function renderAdminPanel() {
        document.getElementById('admin-revenue').innerText = "৳" + adminStats.revenue;
        const pBody = document.getElementById('player-list-body'); pBody.innerHTML = "";
        registrations.forEach(r => {
            pBody.innerHTML += `<div class="card" style="padding:10px; margin-bottom:5px;">${r.mName} | IGN: ${r.ign} | UID: ${r.guid}</div>`;
        });
        const rCont = document.getElementById('admin-requests'); rCont.innerHTML = "";
        requests.forEach((r, idx) => {
            rCont.innerHTML += `<div class="card" style="padding:10px;">${r.type} | ৳${r.amt} <button onclick="approveReq(${idx})">Approve</button></div>`;
        });
    }

    function approveReq(idx) {
        const r = requests[idx];
        if(r.type === 'dep') dbUsers[r.uid].balance += parseFloat(r.amt);
        else dbUsers[r.uid].balance -= parseFloat(r.amt);
        if(user && user.uid === r.uid) user.balance = dbUsers[r.uid].balance;
        requests.splice(idx, 1); saveDB(); renderAdminPanel();
    }

    function createMatch() {
        const name = document.getElementById('m-name').value, fee = document.getElementById('m-fee').value, prize = document.getElementById('m-prize').value, time = document.getElementById('m-time').value;
        const room = document.getElementById('m-room').value, pass = document.getElementById('m-pass').value;
        matches.push({ id: Date.now(), name, fee, prize, startTime: time, roomId: room || "Wait...", password: pass || "Wait..." });
        saveDB(); renderMatches(); alert("Match Published!");
    }

    function renderMatches() {
        const cont = document.getElementById('match-display-container'); cont.innerHTML = "";
        matches.slice().reverse().forEach(m => {
            cont.innerHTML += `<div class="card"><div class="timer-box" id="timer-${m.id}">...</div>
            <h3 style="color:var(--primary); font-family:'Oxanium';">${m.name}</h3>
            <p>Fee: ৳${m.fee} | Prize: ৳${m.prize}</p>
            <button class="btn" onclick="openJoinForm(${m.id})">JOIN NOW</button></div>`;
        });
    }

    function renderMyMatches() {
        const cont = document.getElementById('my-match-list'); cont.innerHTML = "";
        (user.joined_matches || []).forEach(j => {
            const m = matches.find(x => x.id == j.mid);
            cont.innerHTML += `<div class="card" style="border-left:4px solid var(--success);">
                <b style="font-family:'Oxanium';">${j.mName}</b><br>
                <small>IGN: ${j.ign} | UID: ${j.guid}</small>
                <div class="room-info-card">
                    <b>ROOM ID:</b> ${m ? m.roomId : 'N/A'}<br>
                    <b>PASSWORD:</b> ${m ? m.password : 'N/A'}
                </div>
            </div>`;
        });
    }

    function submitRequest() {
        requests.push({ uid: user.uid, type: document.getElementById('w-type').value, amt: document.getElementById('w-amount').value, info: document.getElementById('w-info').value });
        saveDB(); alert("Sent!"); showPage('profile');
    }

    function updateTimers() {
        matches.forEach(m => {
            const el = document.getElementById(`timer-${m.id}`); if(!el) return;
            const dist = new Date(m.startTime).getTime() - new Date().getTime();
            if(dist < 0) el.innerText = "LIVE";
            else { const h = Math.floor(dist/3600000), m_ = Math.floor((dist%3600000)/60000), s = Math.floor((dist%60000)/1000); el.innerText = `${h}H:${m_}M:${s}S`; }
        });
    }

    function userLogout() { user = null; saveDB(); location.reload(); }
    setInterval(updateTimers, 1000);
    window.onload = () => { renderMatches(); if(user) showPage('home'); };
</script>
</body>
</html>

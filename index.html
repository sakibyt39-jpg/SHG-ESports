<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHG亗ESPORTS | Cloud Management</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root { --sky: #00eeff; --bg: #030712; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Rajdhani', sans-serif; }
        .font-orbit { font-family: 'Orbitron', sans-serif; }
        .sky-border { border: 1px solid rgba(0, 238, 255, 0.2); }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .page { display: none; padding-top: 80px; padding-bottom: 120px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(0, 238, 255, 0.2) !important; color: white !important; border-radius: 12px !important; }
        .nav-active { color: var(--sky); filter: drop-shadow(0 0 8px var(--sky)); }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 z-[2000] bg-black flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-sky-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-orbit text-xs tracking-widest animate-pulse">SYNCING WITH FIREBASE...</p>
    </div>

    <header id="main-header" class="fixed top-0 w-full z-[100] glass px-6 py-4 flex justify-between items-center hidden">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-orbit font-bold tracking-tighter">SHG <span class="text-sky-400 italic">亗ESPORTS</span></h1>
        </div>
        <div onclick="showPage('wallet-page')" class="bg-sky-500/10 px-4 py-1.5 rounded-xl border border-sky-500/20 text-right cursor-pointer">
            <p class="text-[8px] text-gray-500 uppercase font-bold leading-none">Wallet</p>
            <p id="u-balance" class="text-lg font-bold text-sky-400">0 ৳</p>
        </div>
    </header>

    <div id="auth-page" class="page active px-6 flex items-center justify-center min-h-screen pt-0">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] sky-border">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-orbit font-bold">WELCOME <span class="text-sky-400">BACK</span></h2>
            </div>
            <div class="space-y-4">
                <input id="l-uid" type="text" placeholder="Game UID" class="w-full p-4 outline-none">
                <input id="l-pass" type="password" placeholder="Password" class="w-full p-4 outline-none">
                <button onclick="app.login()" class="w-full bg-sky-500 text-black py-4 rounded-2xl font-bold text-lg">LOGIN ACCOUNT</button>
                <p class="text-center text-xs text-gray-500 uppercase tracking-widest mt-4">OR</p>
                <button onclick="app.register()" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl font-bold">CREATE NEW ID</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page px-6">
        <div class="mb-8">
            <h3 class="text-lg font-orbit font-bold flex items-center gap-3">
                <span class="w-1.5 h-6 bg-sky-400 rounded-full"></span> LIVE TOURNAMENTS
            </h3>
        </div>
        <div id="match-container" class="space-y-5">
            </div>
    </div>

    <div id="wallet-page" class="page px-6">
        <div class="glass p-10 rounded-[3rem] text-center mb-8 sky-border">
            <p class="text-gray-500 text-xs font-bold uppercase mb-2">Available Balance</p>
            <h1 id="w-balance" class="text-6xl font-orbit font-bold italic">0</h1>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="toggleFinance('deposit')" class="bg-sky-500 text-black py-4 rounded-2xl font-bold">DEPOSIT</button>
            <button onclick="toggleFinance('withdraw')" class="glass py-4 rounded-2xl font-bold border-white/10 border">WITHDRAW</button>
        </div>

        <div id="deposit-box" class="glass p-6 rounded-3xl sky-border mb-6">
            <h4 class="font-bold mb-4">Add Money (Bkash/Nagad)</h4>
            <input id="d-amt" type="number" placeholder="Amount" class="w-full p-3 mb-3">
            <input id="d-trx" type="text" placeholder="Transaction ID" class="w-full p-3 mb-4">
            <button onclick="app.submitFinance('deposit')" class="w-full bg-sky-600/20 text-sky-400 border border-sky-400/30 py-3 rounded-xl font-bold">SUBMIT DEPOSIT</button>
        </div>

        <div id="withdraw-box" class="hidden glass p-6 rounded-3xl border-red-500/20 border mb-6">
            <h4 class="font-bold mb-4 text-red-400">Request Withdrawal</h4>
            <input id="w-amt" type="number" placeholder="Amount" class="w-full p-3 mb-3">
            <input id="w-num" type="text" placeholder="Phone Number" class="w-full p-3 mb-4">
            <button onclick="app.submitFinance('withdraw')" class="w-full bg-red-600/20 text-red-400 border border-red-400/30 py-3 rounded-xl font-bold">SUBMIT WITHDRAW</button>
        </div>
    </div>

    <div id="admin-page" class="page px-6">
        <h2 class="text-2xl font-orbit font-bold text-red-500 italic mb-8">ADMIN CONSOLE</h2>
        
        <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
            <button onclick="admTab('m')" class="whitespace-nowrap px-6 py-2 bg-sky-500 rounded-full text-black font-bold text-xs">MATCHES</button>
            <button onclick="admTab('d')" class="whitespace-nowrap px-6 py-2 glass rounded-full text-xs">DEPOSITS</button>
            <button onclick="admTab('w')" class="whitespace-nowrap px-6 py-2 glass rounded-full text-xs">WITHDRAWALS</button>
        </div>

        <div id="adm-matches" class="space-y-6">
            <div class="glass p-6 rounded-3xl border-white/10 border">
                <h4 class="font-bold mb-4">Create Tournament</h4>
                <div class="space-y-3">
                    <input id="am-title" type="text" placeholder="Title" class="w-full p-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input id="am-fee" type="number" placeholder="Fee" class="w-full p-3">
                        <input id="am-prize" type="number" placeholder="Prize" class="w-full p-3">
                    </div>
                    <button onclick="app.admAddMatch()" class="w-full bg-sky-500 text-black py-3 rounded-xl font-bold">POST MATCH</button>
                </div>
            </div>
        </div>

        <div id="adm-deposits" class="hidden space-y-3"></div>
        <div id="adm-withdraws" class="hidden space-y-3"></div>
    </div>

    <nav id="bottom-nav" class="fixed bottom-0 w-full glass border-t border-white/5 p-6 flex justify-around items-center rounded-t-[3rem] z-[150] hidden">
        <button onclick="showPage('home-page')" class="nav-i text-2xl text-sky-400"><i class="fas fa-gamepad"></i></button>
        <button onclick="showPage('wallet-page')" class="nav-i text-2xl text-gray-500"><i class="fas fa-wallet"></i></button>
        <button onclick="showPage('admin-page')" class="nav-i text-3xl text-gray-800"><i class="fas fa-shield-halved"></i></button>
    </nav>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Toggle Header/Nav
            const isAuth = (id === 'auth-page');
            document.getElementById('main-header').classList.toggle('hidden', isAuth);
            document.getElementById('bottom-nav').classList.toggle('hidden', isAuth);
        }

        function toggleFinance(mode) {
            document.getElementById('deposit-box').classList.toggle('hidden', mode === 'withdraw');
            document.getElementById('withdraw-box').classList.toggle('hidden', mode === 'deposit');
        }

        function admTab(t) {
            document.getElementById('adm-matches').classList.toggle('hidden', t !== 'm');
            document.getElementById('adm-deposits').classList.toggle('hidden', t !== 'd');
            document.getElementById('adm-withdraws').classList.toggle('hidden', t !== 'w');
        }

        const app = {
            state: { user: JSON.parse(localStorage.getItem('shg_auth')) || null },

            init: function() {
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    if(this.state.user) { showPage('home-page'); this.sync(); }
                }, 2000);
            },

            // Cloud Functions
            register: async function() {
                const u = document.getElementById('l-uid').value, p = document.getElementById('l-pass').value;
                if(!u || !p) return alert("Fill data!");
                const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const data = { uid: u, pass: p, balance: 0, role: "player" };
                await setDoc(doc(window.db, "users", u), data);
                this.state.user = data;
                localStorage.setItem('shg_auth', JSON.stringify(data));
                location.reload();
            },

            login: async function() {
                const u = document.getElementById('l-uid').value, p = document.getElementById('l-pass').value;
                const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                const snap = await getDoc(doc(window.db, "users", u));
                if(snap.exists() && snap.data().pass === p) {
                    this.state.user = snap.data();
                    localStorage.setItem('shg_auth', JSON.stringify(this.state.user));
                    location.reload();
                } else alert("Invalid ID/Pass");
            },

            submitFinance: async function(type) {
                const amt = document.getElementById(type === 'deposit' ? 'd-amt' : 'w-amt').value;
                const info = document.getElementById(type === 'deposit' ? 'd-trx' : 'w-num').value;
                if(!amt || !info) return alert("Fields missing!");

                const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                await addDoc(collection(window.db, type === 'deposit' ? "deposits" : "withdraws"), {
                    uid: this.state.user.uid, amount: parseFloat(amt), info: info, status: "pending", time: Date.now()
                });
                alert("Request Sent to Admin!");
                location.reload();
            },

            admAddMatch: async function() {
                const t = document.getElementById('am-title').value, f = document.getElementById('am-fee').value, p = document.getElementById('am-prize').value;
                const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                await addDoc(collection(window.db, "matches"), { title: t, fee: f, prize: p, time: Date.now() });
                alert("Match Posted!");
            },

            approveFin: async function(col, id, uid, amt) {
                const { doc, updateDoc, increment, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                if(col === 'deposits') {
                    await updateDoc(doc(window.db, "users", uid), { balance: increment(amt) });
                } else {
                    // Withdraw logic: subtract if approved
                    await updateDoc(doc(window.db, "users", uid), { balance: increment(-amt) });
                }
                await deleteDoc(doc(window.db, col, id));
                alert("Transaction Approved!");
            }
        };

        window.onload = () => app.init();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXeBxPtMScUNyoctZ61g7eUNy-...", 
            authDomain: "shgesports-15815.firebaseapp.com",
            projectId: "shgesports-15815",
            storageBucket: "shgesports-15815.appspot.com",
            messagingSenderId: "899657492968",
            appId: "1:899657492968:web:5f9a897f47ea683707834a"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);
        window.db = db;

        // Listeners
        if(app.state.user) {
            // User Data Sync
            onSnapshot(doc(db, "users", app.state.user.uid), (d) => {
                const data = d.data();
                document.getElementById('u-balance').innerText = data.balance + " ৳";
                document.getElementById('w-balance').innerText = data.balance;
            });

            // Matches Sync
            onSnapshot(collection(db, "matches"), (snap) => {
                const cont = document.getElementById('match-container');
                cont.innerHTML = snap.docs.map(doc => {
                    const m = doc.data();
                    return `
                        <div class="glass p-6 rounded-3xl sky-border border-l-4 border-sky-500">
                            <h4 class="text-xl font-orbit font-bold">${m.title}</h4>
                            <div class="flex justify-between mt-4">
                                <span class="text-gray-500 text-xs">Entry: ৳${m.fee}</span>
                                <span class="text-sky-400 font-bold">Prize: ৳${m.prize}</span>
                            </div>
                            <button class="w-full mt-4 bg-sky-500/10 border border-sky-500/30 py-2 rounded-xl text-xs font-bold text-sky-400">JOIN NOW</button>
                        </div>
                    `;
                }).join('');
            });

            // Admin Logic Sync
            onSnapshot(collection(db, "deposits"), (snap) => {
                document.getElementById('adm-deposits').innerHTML = snap.docs.map(d => `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <div><p class="text-xs font-bold">${d.data().uid}</p><p class="text-sky-400 font-bold">৳${d.data().amount}</p></div>
                        <button onclick="app.approveFin('deposits', '${d.id}', '${d.data().uid}', ${d.data().amount})" class="bg-green-600 px-4 py-1 rounded-lg text-[10px]">Approve</button>
                    </div>
                `).join('');
            });

            onSnapshot(collection(db, "withdraws"), (snap) => {
                document.getElementById('adm-withdraws').innerHTML = snap.docs.map(d => `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center border-red-500/20 border">
                        <div><p class="text-xs font-bold">${d.data().uid}</p><p class="text-red-400 font-bold">৳${d.data().amount}</p></div>
                        <button onclick="app.approveFin('withdraws', '${d.id}', '${d.data().uid}', ${d.data().amount})" class="bg-red-600 px-4 py-1 rounded-lg text-[10px]">Send Money</button>
                    </div>
                `).join('');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHG亗ESPORTS | Secure Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #05070a; --card: rgba(13, 17, 23, 0.95); --success: #00ff88; --danger: #ff3e3e; --gold: #ffd700; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: radial-gradient(circle at top, #111e31 0%, #05070a 100%); color: #e1e1e1; min-height: 100vh; }
        
        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; z-index: 5000; }

        nav { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Oxanium', sans-serif; color: var(--primary); font-size: 22px; font-weight: 700; letter-spacing: 2px; }

        .container { padding: 20px 5%; max-width: 850px; margin: auto; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid rgba(58, 123, 213, 0.3); border-radius: 16px; padding: 20px; margin-bottom: 20px; position: relative; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #080a0f; border: 1px solid #1e293b; color: white; border-radius: 10px; font-family: 'Rajdhani'; font-size: 16px; box-sizing: border-box; }
        .btn { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-family: 'Oxanium'; text-transform: uppercase; margin-top: 10px; }

        .room-details-match { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; display: none; font-family: 'Oxanium'; text-align: center; color: var(--gold); }
        .visible { display: block; }

        .timer-badge { position: absolute; top: -10px; right: 20px; background: var(--danger); padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo">SHG亗ESPORTS</div>
    <div class="nav-links">
        <button onclick="showPage('home')" style="background:none; border:none; color:white; font-family:'Oxanium';">Matches</button>
        <button onclick="showPage('profile')" style="background:none; border:none; color:white; font-family:'Oxanium'; margin-left:15px;">Account</button>
        <button onclick="showPage('admin-login')" style="background:none; border:none; color:white; font-family:'Oxanium'; margin-left:15px;">Admin</button>
    </div>
</nav>

<div class="container">
    <div id="auth-choice" class="section active">
        <div class="card" style="text-align:center;">
            <h2 style="font-family:'Oxanium';">WELCOME GAMER</h2>
            <p>Select an option to continue</p>
            <button class="btn" onclick="showPage('login-form')">Login to Account</button>
            <button class="btn" style="background:#1e293b;" onclick="showPage('reg-form')">Register New Account</button>
        </div>
    </div>

    <div id="reg-form" class="section">
        <div class="card">
            <h3>CREATE ACCOUNT</h3>
            <input type="text" id="reg-name" placeholder="Your Name">
            <input type="text" id="reg-uid" placeholder="Set Unique UID (Numbers)">
            <input type="password" id="reg-pass" placeholder="Set Account Password">
            <button class="btn" onclick="processRegister()">Register & Login</button>
        </div>
    </div>

    <div id="login-form" class="section">
        <div class="card">
            <h3>LOGIN</h3>
            <input type="text" id="log-uid" placeholder="Enter Your UID">
            <input type="password" id="log-pass" placeholder="Enter Password">
            <button class="btn" onclick="processLogin()">Access Profile</button>
        </div>
    </div>

    <div id="home" class="section">
        <div id="match-container"></div>
    </div>

    <div id="profile" class="section">
        <div class="card" style="text-align:center;">
            <h2 id="p-name" style="color:var(--primary);">...</h2>
            <p id="p-uid" style="opacity:0.6;">UID: 000</p>
            <div style="font-size:24px; color:var(--success);">৳<span id="u-bal">0</span></div>
            <button class="btn" onclick="showPage('wallet')" style="width:150px; font-size:12px;">Wallet</button>
            <button class="btn" onclick="userLogout()" style="background:var(--danger); width:100px; font-size:12px;">Logout</button>
        </div>
        <h3>My Joined Matches</h3>
        <div id="my-joined-list"></div>
    </div>

    <div id="wallet" class="section">
        <div class="card">
            <h3>WALLET SYSTEM</h3>
            <select id="w-type"><option value="dep">Deposit</option><option value="wit">Withdraw</option></select>
            <input type="number" id="w-amt" placeholder="Amount">
            <input type="text" id="w-trx" placeholder="Transaction Info">
            <button class="btn" onclick="submitWallet()">Submit</button>
        </div>
    </div>

    <div id="admin-login" class="section">
        <div id="admin-dash" class="card">
            <h3>ADMIN PANEL</h3>
            <div id="admin-auth-fields">
                <input type="password" id="adm-pass" placeholder="Admin Secret Key">
                <button class="btn" onclick="accessAdmin()">Login Admin</button>
            </div>
            <div id="admin-controls" style="display:none;">
                <h4>Create Match</h4>
                <input type="text" id="m-title" placeholder="Match Title">
                <input type="number" id="m-fee" placeholder="Fee">
                <input type="datetime-local" id="m-time">
                <button class="btn" onclick="addMatch()">Create Match</button>
                <hr>
                <h4>Match List & Room Update</h4>
                <div id="adm-m-list"></div>
                <hr>
                <h4>Finance</h4>
                <div id="adm-req-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let dbUsers = JSON.parse(localStorage.getItem('shg_sec_users')) || {};
    let currentUser = JSON.parse(localStorage.getItem('shg_sec_curr')) || null;
    let matches = JSON.parse(localStorage.getItem('shg_sec_matches')) || [];
    let regs = JSON.parse(localStorage.getItem('shg_sec_regs')) || [];
    let requests = JSON.parse(localStorage.getItem('shg_sec_reqs')) || [];

    function save() {
        localStorage.setItem('shg_sec_users', JSON.stringify(dbUsers));
        localStorage.setItem('shg_sec_curr', JSON.stringify(currentUser));
        localStorage.setItem('shg_sec_matches', JSON.stringify(matches));
        localStorage.setItem('shg_sec_regs', JSON.stringify(regs));
        localStorage.setItem('shg_sec_reqs', JSON.stringify(requests));
    }

    function showPage(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home') renderMatches();
        if(id === 'profile') renderProfile();
    }

    // Auth Logic
    function processRegister() {
        const n = document.getElementById('reg-name').value, u = document.getElementById('reg-uid').value, p = document.getElementById('reg-pass').value;
        if(!n || !u || !p) return alert("Fill all fields!");
        if(dbUsers[u]) return alert("UID already exists!");
        dbUsers[u] = { name: n, uid: u, pass: p, balance: 0 };
        currentUser = dbUsers[u]; save(); showPage('home');
    }

    function processLogin() {
        const u = document.getElementById('log-uid').value, p = document.getElementById('log-pass').value;
        if(dbUsers[u] && dbUsers[u].pass === p) { currentUser = dbUsers[u]; save(); showPage('home'); }
        else alert("Wrong Credentials!");
    }

    // Match Logic
    function addMatch() {
        const t = document.getElementById('m-title').value, f = document.getElementById('m-fee').value, tm = document.getElementById('m-time').value;
        matches.push({ id: Date.now(), title: t, fee: f, time: tm, roomId: "TBA", roomPass: "TBA" });
        save(); renderAdminPanel(); renderMatches();
    }

    function renderMatches() {
        const cont = document.getElementById('match-container'); cont.innerHTML = "";
        matches.forEach(m => {
            const isJoined = currentUser && regs.some(r => r.mid == m.id && r.uUid == currentUser.uid);
            cont.innerHTML += `<div class="card">
                <div class="timer-badge" id="t-${m.id}">Timer</div>
                <h3 style="font-family:'Oxanium'; color:var(--primary);">${m.title}</h3>
                <p>Fee: ৳${m.fee}</p>
                <button class="btn" onclick="joinMatch(${m.id})">${isJoined ? 'ALREADY JOINED' : 'JOIN NOW'}</button>
                <div class="room-details-match ${isJoined ? 'visible' : ''}">
                    <b>ROOM ID:</b> ${m.roomId} | <b>PASS:</b> ${m.roomPass}
                </div>
            </div>`;
        });
    }

    function joinMatch(mid) {
        if(!currentUser) return showPage('auth-choice');
        const m = matches.find(x => x.id == mid);
        if(regs.some(r => r.mid == mid && r.uUid == currentUser.uid)) return;
        if(currentUser.balance < m.fee) return alert("Low Balance!");
        
        currentUser.balance -= parseFloat(m.fee);
        dbUsers[currentUser.uid].balance = currentUser.balance;
        regs.push({ mid: mid, uUid: currentUser.uid, mTitle: m.title });
        save(); renderMatches(); alert("Joined!");
    }

    // Admin Panel Logic
    function accessAdmin() {
        if(document.getElementById('adm-pass').value === "shg123") {
            document.getElementById('admin-auth-fields').style.display = 'none';
            document.getElementById('admin-controls').style.display = 'block';
            renderAdminPanel();
        }
    }

    function renderAdminPanel() {
        const mCont = document.getElementById('adm-m-list'); mCont.innerHTML = "";
        matches.forEach(m => {
            mCont.innerHTML += `<div class="card" style="font-size:12px;">
                <b>${m.title}</b><br>
                <input type="text" id="rid-${m.id}" placeholder="Room ID" value="${m.roomId}">
                <input type="text" id="rps-${m.id}" placeholder="Room Pass" value="${m.roomPass}">
                <button onclick="updateRoomAdmin(${m.id})">Update Details</button>
            </div>`;
        });
    }

    function updateRoomAdmin(id) {
        const m = matches.find(x => x.id == id);
        m.roomId = document.getElementById('rid-'+id).value;
        m.roomPass = document.getElementById('rps-'+id).value;
        save(); alert("Room Updated!"); renderMatches();
    }

    function renderProfile() {
        document.getElementById('p-name').innerText = currentUser.name;
        document.getElementById('p-uid').innerText = "UID: " + currentUser.uid;
        document.getElementById('u-bal').innerText = currentUser.balance;
        const cont = document.getElementById('my-joined-list'); cont.innerHTML = "";
        regs.filter(r => r.uUid == currentUser.uid).forEach(r => {
            const m = matches.find(x => x.id == r.mid);
            cont.innerHTML += `<div class="card" style="border-left:4px solid var(--success);">
                <b>${r.mTitle}</b><br>
                <small>Room: ${m ? m.roomId : 'TBA'} | Pass: ${m ? m.roomPass : 'TBA'}</small>
            </div>`;
        });
    }

    function userLogout() { currentUser = null; save(); location.reload(); }
    function submitWallet() {
        requests.push({ uUid: currentUser.uid, type: document.getElementById('w-type').value, amt: document.getElementById('w-amt').value });
        save(); alert("Sent!");
    }

    // Real-time Timer
    setInterval(() => {
        matches.forEach(m => {
            const el = document.getElementById('t-'+m.id); if(!el) return;
            const diff = new Date(m.time).getTime() - new Date().getTime();
            if(diff < 0) el.innerText = "LIVE";
            else {
                const h = Math.floor(diff/3600000), m_ = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                el.innerText = `${h

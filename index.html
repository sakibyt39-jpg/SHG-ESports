<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIK TOP UP - SHG ESports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --primary: #00d4ff; --bg: #050b18; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-text { text-shadow: 0 0 10px var(--primary); }
        .page { display: none; min-height: 100vh; padding-bottom: 80px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-page" class="page flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl text-center">
            <h1 class="text-4xl font-bold mb-8 neon-text font-['Orbitron']">SHG ESPORTS</h1>
            <div id="auth-tabs" class="flex mb-6 bg-black/40 rounded-xl p-1">
                <button onclick="toggleAuth('login')" class="flex-1 py-2 rounded-lg bg-cyan-500">Login</button>
                <button onclick="toggleAuth('reg')" class="flex-1 py-2 rounded-lg">Register</button>
            </div>
            
            <div id="login-form">
                <input id="l-uid" type="text" placeholder="Game UID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 focus:outline-none focus:border-cyan-500">
                <input id="l-pass" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6">
                <button onclick="app.login()" class="w-full bg-cyan-500 py-4 rounded-xl font-bold shadow-[0_0_20px_rgba(6,182,212,0.4)]">SIGN IN</button>
            </div>

            <div id="reg-form" class="hidden">
                <input id="r-name" type="text" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4">
                <input id="r-uid" type="text" placeholder="Game UID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4">
                <input id="r-pass" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6">
                <button onclick="app.register()" class="w-full bg-cyan-500 py-4 rounded-xl font-bold shadow-[0_0_20px_rgba(6,182,212,0.4)]">CREATE ACCOUNT</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-gray-400">Welcome Back,</p>
                    <h2 id="u-name" class="text-2xl font-bold">Player</h2>
                </div>
                <div class="glass px-4 py-2 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-wallet text-cyan-400"></i>
                    <span id="u-balance" class="font-bold">0</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                <div onclick="showPage('deposit-page')" class="glass p-4 rounded-2xl cursor-pointer hover:bg-cyan-500/10 transition">
                    <i class="fas fa-plus-circle text-2xl mb-2 text-cyan-400"></i>
                    <p>Deposit</p>
                </div>
                <div onclick="showPage('withdraw-page')" class="glass p-4 rounded-2xl cursor-pointer hover:bg-red-500/10 transition">
                    <i class="fas fa-money-bill-transfer text-2xl mb-2 text-red-400"></i>
                    <p>Withdraw</p>
                </div>
            </div>

            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-cyan-500 rounded-full"></span>
                Active Matches
            </h3>
            <div id="match-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="deposit-page" class="page p-6">
        <button onclick="showPage('home-page')" class="mb-6 opacity-50 hover:opacity-100"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        <div class="glass p-6 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6">Add Balance</h2>
            <select id="pay-type" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4">
                <option value="bkash">Bkash</option>
                <option value="nagad">Nagad</option>
            </select>
            <input id="pay-amt" type="number" placeholder="Amount" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4">
            <input id="pay-info" type="text" placeholder="Transaction ID / Number" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6">
            <button onclick="app.submitPayment()" class="w-full bg-cyan-500 py-4 rounded-xl font-bold">SUBMIT REQUEST</button>
        </div>
    </div>

    <nav id="main-nav" class="fixed bottom-0 w-full glass border-t border-white/10 p-4 flex justify-around items-center rounded-t-3xl hidden">
        <button onclick="showPage('home-page')" class="text-2xl text-cyan-400"><i class="fas fa-home"></i></button>
        <button onclick="showPage('matches-page')" class="text-2xl text-gray-500"><i class="fas fa-trophy"></i></button>
        <button onclick="showPage('profile-page')" class="text-2xl text-gray-500"><i class="fas fa-user-shield"></i></button>
    </nav>

    <script>
        // UI Helpers
        function showPage(pid) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pid).classList.add('active');
            document.getElementById('main-nav').style.display = (pid === 'auth-page') ? 'none' : 'flex';
        }

        function toggleAuth(type) {
            document.getElementById('login-form').classList.toggle('hidden', type === 'reg');
            document.getElementById('reg-form').classList.toggle('hidden', type === 'login');
            const btns = document.querySelectorAll('#auth-tabs button');
            btns[0].className = type === 'login' ? 'flex-1 py-2 rounded-lg bg-cyan-500' : 'flex-1 py-2 rounded-lg';
            btns[1].className = type === 'reg' ? 'flex-1 py-2 rounded-lg bg-cyan-500' : 'flex-1 py-2 rounded-lg';
        }

        // APP LOGIC
        const app = {
            db: { current: JSON.parse(localStorage.getItem('shg_session')) || null, matches: [] },

            updateUI: function() {
                if(!this.db.current) return;
                document.getElementById('u-name').innerText = this.db.current.name;
                document.getElementById('u-balance').innerText = this.db.current.balance + " ৳";
            },

            register: async function() {
                const n = document.getElementById('r-name').value, u = document.getElementById('r-uid').value, p = document.getElementById('r-pass').value;
                if(!n || !u || !p) return alert("All fields required!");

                try {
                    const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    const userRef = doc(window.db, "users", u);
                    const userData = { name: n, uid: u, pass: p, balance: 0, rank: "SOLDIER" };
                    await setDoc(userRef, userData);
                    this.db.current = userData;
                    localStorage.setItem('shg_session', JSON.stringify(userData));
                    alert("Account Created!");
                    location.reload();
                } catch(e) { alert("Error: " + e.message); }
            },

            login: async function() {
                const u = document.getElementById('l-uid').value, p = document.getElementById('l-pass').value;
                try {
                    const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    const userSnap = await getDoc(doc(window.db, "users", u));
                    if(userSnap.exists() && userSnap.data().pass === p) {
                        this.db.current = userSnap.data();
                        localStorage.setItem('shg_session', JSON.stringify(this.db.current));
                        location.reload();
                    } else alert("Invalid Credentials!");
                } catch(e) { alert("Login failed!"); }
            },

            renderMatches: function() {
                const list = document.getElementById('match-list');
                list.innerHTML = this.db.matches.map(m => `
                    <div class="glass p-5 rounded-2xl border-l-4 border-cyan-500">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-lg">${m.title}</h4>
                                <p class="text-sm text-gray-400">${m.time}</p>
                            </div>
                            <span class="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-lg text-xs font-bold">JOIN: ${m.fee}৳</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-xs text-gray-500 uppercase">Prize: <span class="text-white">${m.prize}৳</span></div>
                            <button onclick="app.joinMatch('${m.id}')" class="bg-white/10 hover:bg-cyan-500 px-6 py-2 rounded-xl text-sm transition">JOIN MATCH</button>
                        </div>
                    </div>
                `).join('');
            },

            submitPayment: async function() {
                const t = document.getElementById('pay-type').value, a = document.getElementById('pay-amt').value, i = document.getElementById('pay-info').value;
                if(!a || !i) return alert("Fill data!");
                try {
                    const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
                    await addDoc(collection(window.db, "payments"), { u: this.db.current.uid, t, a, i, status: "Pending" });
                    alert("Request Sent!");
                } catch(e) { alert("Failed!"); }
            }
        };

        window.onload = () => {
            if(app.db.current) { showPage('home-page'); app.updateUI(); }
            else { showPage('auth-page'); }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXeBxPtMScUNyoctZ61g7eUNy...", // APNAR KEY EKHANE THAKBE
            authDomain: "shgesports-15815.firebaseapp.com",
            projectId: "shgesports-15815",
            storageBucket: "shgesports-15815.appspot.com",
            messagingSenderId: "899657492968",
            appId: "1:899657492968:web:5f9a897f47ea...",
            measurementId: "G-NTG8VCBYLM"
        };

        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);
        window.db = db;

        // REAL-TIME MATCH LISTENER
        const q = query(collection(db, "matches"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            app.db.matches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            app.renderMatches();
        });
    </script>
</body>
</html
